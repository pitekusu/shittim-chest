name: Dependency Graph

on:
  schedule:
    - cron: "17 3 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-graph-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.14.6"
  UV_VERSION: "0.11.29"

jobs:
  verify-managed-sbom:
    name: verify-managed-sbom
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pinned Python and uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Synchronize the locked environment
        run: uv sync --frozen --all-groups
      - name: Generate the tested source SBOM
        run: |
          uv export --quiet --frozen --all-groups --format cyclonedx1.5 \
            --output-file "${RUNNER_TEMP}/source-sbom.cdx.json"
      - name: Wait for and compare the GitHub-managed SPDX SBOM
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          main_sha=$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)
          if [ "${main_sha}" != "${GITHUB_SHA}" ]; then
            printf 'main advanced from %s to %s; rerun against the new main\n' \
              "${GITHUB_SHA}" "${main_sha}"
            exit 1
          fi
          for attempt in {1..10}; do
            gh api --method GET \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${GITHUB_REPOSITORY}/dependency-graph/sbom" \
              > "${RUNNER_TEMP}/github-sbom.spdx.json"
            comparison=1
            if uv run --frozen python tools/check_sbom.py compare-github \
              "${RUNNER_TEMP}/source-sbom.cdx.json" \
              "${RUNNER_TEMP}/github-sbom.spdx.json"; then
              comparison=0
            fi
            main_sha=$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)
            if [ "${main_sha}" != "${GITHUB_SHA}" ]; then
              printf 'main advanced from %s to %s; discard this comparison and rerun\n' \
                "${GITHUB_SHA}" "${main_sha}"
              exit 1
            fi
            if [ "${comparison}" -eq 0 ]; then
              exit 0
            fi
            if [ "${attempt}" -eq 10 ]; then
              printf 'managed Dependency Graph did not converge after %s attempts\n' "${attempt}" >&2
              exit 1
            fi
            sleep 30
          done
      - name: Retain both SBOM representations
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-graph-sbom-${{ github.sha }}
          path: |
            ${{ runner.temp }}/source-sbom.cdx.json
            ${{ runner.temp }}/github-sbom.spdx.json
          if-no-files-found: error
          retention-days: 30
