name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOCKER_BUILD_RECORD_RETENTION_DAYS: "30"
  PYTHON_VERSION: "3.14.6"
  UV_VERSION: "0.11.29"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned Python and uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Verify and synchronize the lock
        run: |
          uv lock --check
          uv sync --frozen --all-groups
      - name: Check formatting and lint
        run: |
          uv run --frozen ruff format --check .
          uv run --frozen ruff check .
          uv run --frozen python tools/check_container_policy.py
          uv run --frozen python tools/check_tool_versions.py validate \
            .github/tool-versions.json
      - name: Check types with ty
        run: uv run --frozen ty check
      - name: Check architecture boundaries
        run: uv run --frozen lint-imports

  tests:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned Python and uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Synchronize the locked environment
        run: uv sync --frozen --all-groups
      - name: Start pinned DynamoDB Local
        run: |
          docker run --detach --rm --name dynamodb-local --publish 127.0.0.1:8000:8000 \
            amazon/dynamodb-local@sha256:d89f8fcc6b1a39cb35976c248ed42a28c66ae00dc043099210f5571e42648ab4 \
            -jar DynamoDBLocal.jar -inMemory -sharedDb
          for _ in {1..30}; do
            if curl --silent --output /dev/null http://127.0.0.1:8000; then
              exit 0
            fi
            sleep 1
          done
          docker logs dynamodb-local
          exit 1
      - name: Run unit, property, and persistence tests
        env:
          DYNAMODB_ENDPOINT_URL: http://127.0.0.1:8000
        run: uv run --frozen pytest

  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the complete tested history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Python and uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Synchronize the locked environment
        run: uv sync --frozen --all-groups
      - name: Install pinned cosign verifier
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6
      - name: Audit locked Python dependencies
        run: |
          uv export --quiet --frozen --all-groups --no-emit-project --no-annotate \
            --output-file "${RUNNER_TEMP}/audit-requirements.txt"
          uv run --frozen pip-audit --strict --require-hashes \
            --requirement "${RUNNER_TEMP}/audit-requirements.txt"
      - name: Scan the public repository surface
        run: uv run --frozen python tools/check_public_surface.py
      - name: Install verified Betterleaks
        run: |
          betterleaks_version=$(jq --raw-output '.tools.betterleaks.version' .github/tool-versions.json)
          betterleaks_archive_name=$(jq --raw-output '.tools.betterleaks.archive_name' .github/tool-versions.json)
          betterleaks_archive_sha=$(jq --raw-output '.tools.betterleaks.archive_sha256' .github/tool-versions.json)
          checksums_name=$(jq --raw-output '.tools.betterleaks.checksums_name' .github/tool-versions.json)
          checksums_sha=$(jq --raw-output '.tools.betterleaks.checksums_sha256' .github/tool-versions.json)
          bundle_name=$(jq --raw-output '.tools.betterleaks.signature_bundle_name' .github/tool-versions.json)
          bundle_sha=$(jq --raw-output '.tools.betterleaks.signature_bundle_sha256' .github/tool-versions.json)
          certificate_identity=$(jq --raw-output '.tools.betterleaks.certificate_identity' .github/tool-versions.json)
          certificate_issuer=$(jq --raw-output '.tools.betterleaks.certificate_oidc_issuer' .github/tool-versions.json)
          betterleaks_release="https://github.com/betterleaks/betterleaks/releases/download/v${betterleaks_version}"
          betterleaks_archive="${RUNNER_TEMP}/${betterleaks_archive_name}"
          checksums="${RUNNER_TEMP}/${checksums_name}"
          bundle="${RUNNER_TEMP}/${bundle_name}"

          curl --fail --location --proto '=https' --show-error --silent --tlsv1.2 \
            --output "${betterleaks_archive}" "${betterleaks_release}/${betterleaks_archive_name}"
          curl --fail --location --proto '=https' --show-error --silent --tlsv1.2 \
            --output "${checksums}" "${betterleaks_release}/${checksums_name}"
          curl --fail --location --proto '=https' --show-error --silent --tlsv1.2 \
            --output "${bundle}" "${betterleaks_release}/${bundle_name}"
          printf '%s  %s\n' "${betterleaks_archive_sha}" "${betterleaks_archive}" | sha256sum --check --strict
          printf '%s  %s\n' "${checksums_sha}" "${checksums}" | sha256sum --check --strict
          printf '%s  %s\n' "${bundle_sha}" "${bundle}" | sha256sum --check --strict
          cosign verify-blob "${checksums}" \
            --bundle "${bundle}" \
            --certificate-identity "${certificate_identity}" \
            --certificate-oidc-issuer "${certificate_issuer}"
          signed_archive_sha=$(awk -v archive="${betterleaks_archive_name}" \
            '$2 == archive {print $1}' "${checksums}")
          test "${signed_archive_sha}" = "${betterleaks_archive_sha}"
          tar --extract --gzip --file "${betterleaks_archive}" \
            --directory "${RUNNER_TEMP}" betterleaks
          test "$("${RUNNER_TEMP}/betterleaks" version)" = "${betterleaks_version}"

      - name: Scan complete Git history with Betterleaks
        run: |
          "${RUNNER_TEMP}/betterleaks" git --redact --no-banner --verbose .
      - name: Exercise secret-scanner positive and negative contracts
        run: |
          uv run --frozen python tools/check_secret_scanners.py \
            --betterleaks "${RUNNER_TEMP}/betterleaks"
      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low
          fail-on-scopes: runtime, development, unknown
          show-openssf-scorecard: true
      - name: Generate and validate the source SBOM
        run: |
          uv export --quiet --frozen --all-groups --format cyclonedx1.5 \
            --output-file "${RUNNER_TEMP}/source-sbom.cdx.json"
          uv run --frozen python tools/check_sbom.py validate \
            "${RUNNER_TEMP}/source-sbom.cdx.json"
      - name: Retain the source SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-sbom-${{ github.sha }}
          path: ${{ runner.temp }}/source-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

  package:
    name: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned Python and uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Build source and wheel distributions
        run: uv build --no-sources
      - name: Install and import only the built wheel
        run: |
          environment="${RUNNER_TEMP}/wheel-smoke"
          expected_version=$(uv run --frozen python -c \
            'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          export EXPECTED_VERSION="${expected_version}"
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name '*.whl' -print)
          if [ "${#wheels[@]}" -ne 1 ]; then
            printf 'expected exactly one wheel, found %s\n' "${#wheels[@]}" >&2
            exit 1
          fi
          uv venv --python "${PYTHON_VERSION}" "${environment}"
          uv export --quiet --frozen --no-dev --no-emit-project --no-annotate \
            --output-file "${RUNNER_TEMP}/runtime-requirements.txt"
          uv pip install --python "${environment}/bin/python" --require-hashes \
            --only-binary=:all: \
            --requirement "${RUNNER_TEMP}/runtime-requirements.txt"
          uv pip install --python "${environment}/bin/python" --no-deps --no-index \
            "${wheels[0]}"
          cd "${RUNNER_TEMP}"
          "${environment}/bin/python" -I -c \
            'import importlib.metadata, os, pathlib, shittim_chest, sys; package = pathlib.Path(shittim_chest.__file__).resolve().parent; assert importlib.metadata.version("shittim-chest") == os.environ["EXPECTED_VERSION"]; assert package.is_relative_to(pathlib.Path(sys.prefix).resolve()); assert (package / "py.typed").is_file()'

  cdk:
    name: cdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install locked CDK dependencies
        run: npm ci
      - name: Audit locked CDK dependencies
        run: npm run audit:infra
      - name: Type-check, test, and synthesize CDK
        run: npm run check:infra

  container-arm64:
    name: container-arm64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Confirm the native ARM64 runner
        run: |
          test "$(uname -m)" = "aarch64"
          test "$(docker info --format '{{.Architecture}}')" = "aarch64"
      - name: Require read-only DHI credentials
        env:
          DHI_TOKEN: ${{ secrets.DHI_TOKEN }}
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
        run: |
          test -n "${DHI_USERNAME}" || {
            echo "DHI_USERNAME is unavailable; fork PRs must be reproduced on a trusted branch." >&2
            exit 1
          }
          test -n "${DHI_TOKEN}" || {
            echo "DHI_TOKEN is unavailable; fork PRs must be reproduced on a trusted branch." >&2
            exit 1
          }
      - name: Authenticate the DHI registry and Docker Scout
        env:
          DHI_TOKEN: ${{ secrets.DHI_TOKEN }}
          DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
        run: |
          printf '%s' "${DHI_TOKEN}" | docker login dhi.io \
            --username "${DHI_USERNAME}" --password-stdin
          printf '%s' "${DHI_TOKEN}" | docker login docker.io \
            --username "${DHI_USERNAME}" --password-stdin
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Verify the pinned DHI ARM64 manifests
        run: |
          verify_manifest() {
            policy_key=$1
            reference=$(jq --raw-output ".dhi.${policy_key}.reference" container-policy.json)
            expected=$(jq --raw-output ".dhi.${policy_key}.arm64_manifest_digest" container-policy.json)
            actual=$(docker buildx imagetools inspect --raw "${reference}" | jq --raw-output '
              .manifests[]
              | select(.platform.os == "linux" and .platform.architecture == "arm64")
              | .digest
            ')
            test "${actual}" = "${expected}"
          }
          verify_manifest builder
          verify_manifest runtime
      - name: Build and load the production image
        id: build-production
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: production
          tags: shittim-chest:step-08b-arm64
          load: true
          cache-from: type=gha,scope=container-arm64-production
          cache-to: type=gha,scope=container-arm64-production,mode=max,ignore-error=true
      - name: Record the tested image digest and size
        env:
          IMAGE_DIGEST: ${{ steps.build-production.outputs.digest }}
        run: |
          test "$(printf '%s' "${IMAGE_DIGEST}" | grep -E '^sha256:[0-9a-f]{64}$')" = \
            "${IMAGE_DIGEST}"
          printf '%s\n' "${IMAGE_DIGEST}" > "${RUNNER_TEMP}/image-manifest-digest.txt"
          docker image inspect shittim-chest:step-08b-arm64 --format '{{.Size}}' \
            > "${RUNNER_TEMP}/image-size-bytes.txt"
      - name: Build and load the CI-only fault image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: fault-test
          tags: shittim-chest:step-08b-fault-arm64
          load: true
      - name: Validate image security and inject termination faults
        run: |
          python -m tools.run_container_gate \
            --production-image shittim-chest:step-08b-arm64 \
            --fault-image shittim-chest:step-08b-fault-arm64 \
            --expected-architecture arm64
      - name: Install pinned Syft
        run: |
          syft_version=$(jq --raw-output '.tools.syft.version' .github/tool-versions.json)
          syft_archive_name=$(jq --raw-output '.tools.syft.archive_name' .github/tool-versions.json)
          syft_archive_sha=$(jq --raw-output '.tools.syft.archive_sha256' .github/tool-versions.json)
          archive="${RUNNER_TEMP}/${syft_archive_name}"
          curl --fail --location --proto '=https' --show-error --silent --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/anchore/syft/releases/download/v${syft_version}/${syft_archive_name}"
          printf '%s  %s\n' "${syft_archive_sha}" "${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" syft
          test "$("${RUNNER_TEMP}/syft" version -o json | jq --raw-output .version)" = \
            "${syft_version}"
      - name: Install pinned Docker Scout
        run: |
          scout_version=$(jq --raw-output '.tools["docker-scout"].version' .github/tool-versions.json)
          scout_archive_name=$(jq --raw-output '.tools["docker-scout"].archive_name' .github/tool-versions.json)
          scout_archive_sha=$(jq --raw-output '.tools["docker-scout"].archive_sha256' .github/tool-versions.json)
          archive="${RUNNER_TEMP}/${scout_archive_name}"
          curl --fail --location --proto '=https' --show-error --silent --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/docker/scout-cli/releases/download/v${scout_version}/${scout_archive_name}"
          printf '%s  %s\n' "${scout_archive_sha}" "${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" docker-scout
          installed_version=$("${RUNNER_TEMP}/docker-scout" version | \
            sed -n 's/^version: v\([^ ]*\).*/\1/p')
          test "${installed_version}" = "${scout_version}"
      - name: Fetch and verify the DHI VEX attestation
        run: |
          runtime_reference=$(jq --raw-output '.dhi.runtime.reference' container-policy.json)
          "${RUNNER_TEMP}/docker-scout" vex get \
            --verify \
            --skip-tlog \
            --platform linux/arm64 \
            --output "${RUNNER_TEMP}/dhi-python-runtime.openvex.json" \
            "registry://${runtime_reference}"
          test -s "${RUNNER_TEMP}/dhi-python-runtime.openvex.json"
          jq --exit-status '.statements | type == "array" and length > 0' \
            "${RUNNER_TEMP}/dhi-python-runtime.openvex.json"
      - name: Generate and validate the final image SPDX SBOM
        run: |
          "${RUNNER_TEMP}/syft" docker:shittim-chest:step-08b-arm64 \
            --output "spdx-json=${RUNNER_TEMP}/image-sbom-arm64.spdx.json"
          python tools/check_image_sbom.py \
            "${RUNNER_TEMP}/image-sbom-arm64.spdx.json"
      - name: Retain the final image SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-sbom-arm64-${{ github.sha }}
          path: |
            ${{ runner.temp }}/image-sbom-arm64.spdx.json
            ${{ runner.temp }}/image-manifest-digest.txt
            ${{ runner.temp }}/image-size-bytes.txt
            ${{ runner.temp }}/dhi-python-runtime.openvex.json
          if-no-files-found: error
          retention-days: 30

  grype:
    name: grype
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - security
      - container-arm64
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out the tested commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Download the source SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: source-sbom-${{ github.sha }}
          path: ${{ runner.temp }}/grype-input/source
      - name: Download the arm64 image SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-sbom-arm64-${{ github.sha }}
          path: ${{ runner.temp }}/grype-input/image
      - name: Install pinned Grype
        run: |
          grype_version=$(jq --raw-output '.tools.grype.version' .github/tool-versions.json)
          grype_archive_name=$(jq --raw-output '.tools.grype.archive_name' .github/tool-versions.json)
          grype_archive_sha=$(jq --raw-output '.tools.grype.archive_sha256' .github/tool-versions.json)
          archive="${RUNNER_TEMP}/${grype_archive_name}"
          curl --fail --location --proto '=https' --show-error --silent --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/anchore/grype/releases/download/v${grype_version}/${grype_archive_name}"
          printf '%s  %s\n' "${grype_archive_sha}" "${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" grype
          test "$("${RUNNER_TEMP}/grype" version -o json | jq --raw-output .version)" = \
            "${grype_version}"
      - name: Stamp the daily database cache key
        id: database-date
        run: echo "date=$(date --utc +%Y-%m-%d)" >> "${GITHUB_OUTPUT}"
      - name: Cache the Grype vulnerability database for one day
        id: grype-database-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ runner.os }}-${{ steps.database-date.outputs.date }}
          restore-keys: |
            grype-db-${{ runner.os }}-
      - name: Update the Grype vulnerability database
        if: steps.grype-database-cache.outputs.cache-hit != 'true'
        run: |
          "${RUNNER_TEMP}/grype" db update
      - name: Generate complete unfiltered Grype JSON reports
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
          GRYPE_DB_AUTO_UPDATE: "false"
        run: |
          "${RUNNER_TEMP}/grype" \
            "sbom:${RUNNER_TEMP}/grype-input/source/source-sbom.cdx.json" \
            --name "source-sbom" \
            --output "json=${RUNNER_TEMP}/grype-source.full.json"
          "${RUNNER_TEMP}/grype" \
            "sbom:${RUNNER_TEMP}/grype-input/image/image-sbom-arm64.spdx.json" \
            --name "image-sbom-arm64" \
            --output "json=${RUNNER_TEMP}/grype-image-arm64.full.json"
      - name: Apply verified DHI VEX for residual-risk classification
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
          GRYPE_DB_AUTO_UPDATE: "false"
        run: |
          "${RUNNER_TEMP}/grype" \
            "sbom:${RUNNER_TEMP}/grype-input/image/image-sbom-arm64.spdx.json" \
            --name "image-sbom-arm64-vex" \
            --vex "${RUNNER_TEMP}/grype-input/image/dhi-python-runtime.openvex.json" \
            --output "json=${RUNNER_TEMP}/grype-image-arm64.vex.json"
      - name: Generate actionable-only SARIF
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
          GRYPE_DB_AUTO_UPDATE: "false"
        run: |
          mkdir -p "${RUNNER_TEMP}/grype-sarif"
          "${RUNNER_TEMP}/grype" \
            "sbom:${RUNNER_TEMP}/grype-input/source/source-sbom.cdx.json" \
            --name "source-sbom" \
            --only-fixed \
            --output "json=${RUNNER_TEMP}/grype-source.actionable.json" \
            --output "sarif=${RUNNER_TEMP}/grype-sarif/grype-source.sarif"
          "${RUNNER_TEMP}/grype" \
            "sbom:${RUNNER_TEMP}/grype-input/image/image-sbom-arm64.spdx.json" \
            --name "image-sbom-arm64" \
            --only-fixed \
            --output "json=${RUNNER_TEMP}/grype-image-arm64.actionable.json" \
            --output "sarif=${RUNNER_TEMP}/grype-sarif/grype-image-arm64.sarif"
      - name: Validate full and actionable report separation
        run: |
          python tools/report_grype.py \
            --source-full "${RUNNER_TEMP}/grype-source.full.json" \
            --source-actionable "${RUNNER_TEMP}/grype-source.actionable.json" \
            --image-full "${RUNNER_TEMP}/grype-image-arm64.full.json" \
            --image-actionable "${RUNNER_TEMP}/grype-image-arm64.actionable.json" \
            --image-sbom "${RUNNER_TEMP}/grype-input/image/image-sbom-arm64.spdx.json" \
            --image-size-file "${RUNNER_TEMP}/grype-input/image/image-size-bytes.txt" \
            --output "${RUNNER_TEMP}/grype-summary.json"
      - name: Point the SARIF locations at repository files
        run: |
          rewrite_locations() {
            local input="$1" file="$2"
            jq --arg file "${file}" '
              (.runs[].results[].locations[]?.physicalLocation? | objects) |= (
                .artifactLocation.uri = $file | .region = {startLine: 1}
              )' "${input}" > "${input}.fixed"
            mv "${input}.fixed" "${input}"
          }
          rewrite_locations "${RUNNER_TEMP}/grype-sarif/grype-source.sarif" "uv.lock"
          rewrite_locations "${RUNNER_TEMP}/grype-sarif/grype-image-arm64.sarif" "Dockerfile"
      - name: Retain the complete Grype scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-scan-${{ github.sha }}
          path: |
            ${{ runner.temp }}/grype-source.full.json
            ${{ runner.temp }}/grype-source.actionable.json
            ${{ runner.temp }}/grype-image-arm64.full.json
            ${{ runner.temp }}/grype-image-arm64.actionable.json
            ${{ runner.temp }}/grype-image-arm64.vex.json
            ${{ runner.temp }}/grype-summary.json
          if-no-files-found: error
          retention-days: 30
      - name: Upload the source SBOM SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: ${{ runner.temp }}/grype-sarif/grype-source.sarif
          category: grype-source-sbom
      - name: Upload the image SBOM SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: ${{ runner.temp }}/grype-sarif/grype-image-arm64.sarif
          category: grype-image-sbom
      - name: Enforce fixable severity and residual-risk gates
        if: always()
        env:
          GRYPE_CHECK_FOR_APP_UPDATE: "false"
          GRYPE_DB_AUTO_UPDATE: "false"
        run: |
          status=0
          python tools/check_container_risk_acceptance.py \
            --policy security/container-risk-acceptance.json \
            --raw-report "${RUNNER_TEMP}/grype-image-arm64.full.json" \
            --vex-report "${RUNNER_TEMP}/grype-image-arm64.vex.json" \
            --image-digest-file \
              "${RUNNER_TEMP}/grype-input/image/image-manifest-digest.txt" || status=$?
          "${RUNNER_TEMP}/grype" \
            "sbom:${RUNNER_TEMP}/grype-input/source/source-sbom.cdx.json" \
            --name "source-sbom-actionable" \
            --only-fixed \
            --fail-on high || status=$?
          "${RUNNER_TEMP}/grype" \
            "sbom:${RUNNER_TEMP}/grype-input/image/image-sbom-arm64.spdx.json" \
            --name "image-sbom-arm64-actionable" \
            --only-fixed \
            --fail-on high || status=$?
          if [ "${status}" -ne 0 ]; then
            echo "Fixable High/Critical or untracked residual container risk blocks merge." >&2
            exit "${status}"
          fi

  docs-public-safety:
    name: docs-public-safety
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the complete tested history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Python and uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - name: Synchronize the locked environment
        run: uv sync --frozen --all-groups
      - name: Validate public files and documentation
        run: |
          uv run --frozen python tools/check_public_surface.py
          uv run --frozen python -m tools.check_docs
      - name: Validate GitHub Actions workflows
        run: |
          actionlint_version=$(jq --raw-output '.tools.actionlint.version' .github/tool-versions.json)
          actionlint_archive_name=$(jq --raw-output '.tools.actionlint.archive_name' .github/tool-versions.json)
          actionlint_archive_sha=$(jq --raw-output '.tools.actionlint.archive_sha256' .github/tool-versions.json)
          archive="${RUNNER_TEMP}/actionlint.tar.gz"
          curl --fail --location --proto '=https' --show-error --silent --tlsv1.2 \
            --output "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${actionlint_version}/${actionlint_archive_name}"
          printf '%s  %s\n' "${actionlint_archive_sha}" "${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" actionlint
          installed_version=$("${RUNNER_TEMP}/actionlint" -version | head -n 1)
          test "${installed_version}" = "${actionlint_version}"
          "${RUNNER_TEMP}/actionlint" -color
      - name: Check changed lines for whitespace errors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --check "${BASE_SHA}" "${GITHUB_SHA}"
          elif git cat-file -e "${GITHUB_SHA}^" 2>/dev/null; then
            git diff --check "${GITHUB_SHA}^" "${GITHUB_SHA}"
          else
            git diff --check
          fi
